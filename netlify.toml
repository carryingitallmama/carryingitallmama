# Netlify Configuration for Carrying It All
# carryingitallmama.com

[build]
  publish = "."

# Redirect www to non-www
[[redirects]]
  from = "https://www.carryingitallmama.com/*"
  to   = "https://carryingitallmama.com/:splat"
  status = 301
  force  = true

# Clean URLs (optional — makes /about work in addition to /about.html)
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/episodes"
  to   = "/episodes.html"
  status = 200

[[redirects]]
  from = "/listen"
  to   = "/listen.html"
  status = 200

[[redirects]]
  from = "/community"
  to   = "/community.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options         = "DENY"
    X-Content-Type-Options  = "nosniff"
    Referrer-Policy         = "strict-origin-when-cross-origin"
    Permissions-Policy      = "camera=(), microphone=(), geolocation=()"

# Cache static assets aggressively
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
